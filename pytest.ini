[pytest]
testpaths = tests
addopts = -ra --strict-markers --strict-config --tb=short
filterwarnings =
    error
    ignore::DeprecationWarning:pydub.*
    ignore::DeprecationWarning:openai.*
    ignore::DeprecationWarning:pkg_resources.*
pythonpath = .
markers =
    allow_network: explicitly allow real network calls (none used in this plan)
